---
layout: default
---

<div class="container">
  <div class="columns is-centered is-mobile">
    <div class="column is-four-fifths">

      {% for post in site.posts %}
      <article class="post">

        <a href="{{ site.baseurl }}{{ post.url }}"><h1 class="title">{{ post.title }}</h1></a>
        <a href="{{ site.baseurl }}{{ post.url }}"><h2 class="subtitle">{{ post.subtitle }}</h2></a>

        <div class="date has-text-right">
          Written on {{ post.date | date: "%B %e, %Y" }}
        </div>

      </article>

      {% if forloop.last == false %}
        <hr>
      {% endif %}

      {% endfor %}

    </div>
  </div>
</div>
