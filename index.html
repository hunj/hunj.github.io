---
layout: default
---

<div class="section-bg bg-img-cleveland bg-cover bg-fade">
  <div class="bg-fade-overlay"></div>
</div>

<div class="is-flex is-justify-content-center" style="margin: -64px auto 64px auto; padding-bottom: 64px;">
  <img src="{{ site.author.avatar }}" style="width: 128px; height: 128px; position: absolute; border-style:solid; border-color: #fff; border-width: 0.25rem; border-radius: 100%">
</div>
<div class="container is-medium has-text-centered pb-4">
  <h1 class="title">{{ site.author.name }}</h1>
  <h2 class="subtitle">{{ site.author.title }} in {{ site.author.location }}</h2>
</div>

<div class="container">
  <section class="py-4">
    <div class="columns is-flex is-flex-direction-row is-flex-wrap-wrap is-align-items-stretch mb-6">
      {% assign blog_preview = site.posts | slice:0, 6%}
      {% for post in blog_preview %}
      <article class="column is-full-mobile is-full-tablet is-one-third-desktop is-flex is-align-content-stretch">
        <div class="card is-full-width">
          <div class="card-content is-full-height">
            <div class="content is-full-height is-flex is-flex-direction-column">

              <a href="{{ site.baseurl }}{{ post.url }}"><h1 class="title">{{ post.title }}</h1></a>
              <p>{{ post.subtitle }}</p>
              
              <div class="date has-text-right">
                <small>{{ post.date | date: "%b %e, %Y" }}</small>
              </div>
              
            </div>
          </div>
        </div>
      </article>
      {% endfor %}
    </div>
    
    <p class="has-text-centered">- <a href="/blog">Read More</a> -</p>

  </section>
</div>
