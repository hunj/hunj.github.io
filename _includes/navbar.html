<nav class="navbar is-transparent is-fixed-top">
  <div class="navbar-brand">
    <a class="navbar-item" href="{{ site.baseurl }}/">
      <strong class="is-size-4">{{ site.title }}</strong>
    </a>
    <span class="navbar-burger burger" data-target="navbarMenu">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </div>
  <div id="navbarMenu" class="navbar-menu">
    <div class="navbar-end mr-4">
      <a href="{{ site.baseurl }}/" class="navbar-item">
        Home
      </a>
      <a href="{{ site.baseurl }}/blog" class="navbar-item">
        Blog
      </a>
      <a href="{{ site.baseurl }}/about" class="navbar-item">
        About
      </a>
      <a href="{{ site.baseurl }}/resume" class="navbar-item">
        Resume
      </a>
    </div>
  </div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function () {

  // Get all "navbar-burger" elements
  var $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);

  // Check if there are any navbar burgers
  if ($navbarBurgers.length > 0) {

    // Add a click event on each of them
    $navbarBurgers.forEach(function ($el) {
      $el.addEventListener('click', function () {

        // Get the target from the "data-target" attribute
        var target = $el.dataset.target;
        var $target = document.getElementById(target);

        // Toggle the class on both the "navbar-burger" and the "navbar-menu"
        $el.classList.toggle('is-active');
        $target.classList.toggle('is-active');

      });
    });
  }

});
</script>
